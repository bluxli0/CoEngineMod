name: Build Geode Mod

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'robots.txt'
      - 'ai.txt'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            target: win
          - name: macOS
            os: macos-latest
            target: mac
          - name: iOS
            os: macos-latest
            target: ios
          - name: Android (32-bit)
            os: ubuntu-latest
            target: android32
          - name: Android (64-bit)
            os: ubuntu-latest
            target: android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Platform Target
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          platform: ${{ matrix.config.target }}
          build-config: Release

  package:
    name: Package Unified Binary
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Combine Platform Artifacts
        uses: geode-sdk/build-geode-mod/combine@main
        id: merge_step

      - name: Upload Multiplatform .geode Bundle
        uses: actions/upload-artifact@v4
        with:
          name: CoEngine-Multiplatform
          path: ${{ steps.merge_step.outputs.build-output }}
